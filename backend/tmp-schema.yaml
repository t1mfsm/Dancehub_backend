components:
  schemas:
    Attendance:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        lesson_id:
          type: integer
          readOnly: true
        lesson_date:
          type: string
          format: date
          readOnly: true
        course_id:
          type: integer
          readOnly: true
        course_name:
          type: string
          readOnly: true
        student_id:
          type: integer
          readOnly: true
        student_name:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/Status27cEnum'
        marked_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course_id
      - course_name
      - id
      - lesson_date
      - lesson_id
      - marked_at
      - status
      - student_id
      - student_name
    AttendanceMark:
      type: object
      properties:
        student_id:
          type: integer
        status:
          $ref: '#/components/schemas/Status27cEnum'
      required:
      - status
      - student_id
    AttendanceMarkRequest:
      type: object
      properties:
        student_id:
          type: integer
        status:
          $ref: '#/components/schemas/Status27cEnum'
      required:
      - status
      - student_id
    BlankEnum:
      enum:
      - ''
    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        course_id:
          type: integer
          readOnly: true
        course_name:
          type: string
          readOnly: true
        teacher_name:
          type: string
          readOnly: true
        dance_style:
          type: string
          readOnly: true
        lesson_date:
          type: string
          format: date
        time_from:
          type: string
          format: time
        time_to:
          type: string
          format: time
        start:
          type: string
          readOnly: true
        end:
          type: string
          readOnly: true
        location_text:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/Status627Enum'
        studio:
          type: string
          readOnly: true
        city:
          type: string
          readOnly: true
      required:
      - city
      - course_id
      - course_name
      - dance_style
      - end
      - id
      - lesson_date
      - start
      - studio
      - teacher_name
      - time_from
      - time_to
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - current_password
      - new_password
      - new_password_confirm
    City:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 128
      required:
      - id
      - name
    CourseDashboardItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusE0cEnum'
        students_count:
          type: integer
          readOnly: true
        lessons_count:
          type: integer
          readOnly: true
      required:
      - id
      - lessons_count
      - name
      - students_count
    CourseDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        level:
          $ref: '#/components/schemas/LevelEnum'
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        capacity:
          type: integer
          maximum: 2147483647
          minimum: 0
        date_from:
          type: string
          format: date
        date_to:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusE0cEnum'
        image_cover:
          type: string
          format: uri
          maxLength: 200
        teacher_id:
          type: integer
          readOnly: true
        teacher_name:
          type: string
          readOnly: true
        dance_style:
          type: string
          readOnly: true
        dance_style_slug:
          type: string
          readOnly: true
        city:
          type: string
          readOnly: true
        studio:
          type: string
          readOnly: true
        hall:
          type: string
          readOnly: true
        music:
