openapi: 3.0.3
info:
  title: DanceHub API
  version: 1.0.0
  description: API для каталога курсов, справочников и интеграции с фронтом.
paths:
  /api/auth/change-password/:
    post:
      operationId: api_auth_change_password_create
      description: Меняет пароль текущего пользователя.
      summary: Сменить пароль
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Авторизует пользователя и возвращает JWT токены.
      summary: Логин
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Добавляет refresh token в blacklist и завершает сессию пользователя.
      summary: Выход из системы
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Logout'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: api_auth_refresh_create
      description: Принимает refresh token и возвращает новый access token.
      summary: Обновить access token
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      description: Создает нового пользователя и сразу возвращает JWT токены.
      summary: Регистрация
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/calendar/:
    get:
      operationId: api_calendar_list
      description: Возвращает занятия для календаря текущего пользователя.
      summary: Календарь занятий пользователя
      parameters:
      - in: query
        name: course_id
        schema:
          type: integer
        description: Фильтр по курсу
      - in: query
        name: date_from
        schema:
          type: string
        description: Дата от YYYY-MM-DD
      - in: query
        name: date_to
        schema:
          type: string
        description: Дата до YYYY-MM-DD
      - in: query
        name: mode
        schema:
          type: string
        description: all | enrolled | teaching
      tags:
      - Calendar
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalendarEvent'
          description: ''
  /api/cities/:
    get:
      operationId: api_cities_list
      description: Возвращает справочник городов для фильтров и форм.
      summary: Список городов
      tags:
      - Reference
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'
          description: ''
  /api/courses/:
    get:
      operationId: api_courses_list
      description: Возвращает список курсов с простой фильтрацией по query params.
      summary: Список курсов
      parameters:
      - in: query
        name: city
        schema:
          type: string
        description: Название города
      - in: query
        name: level
        schema:
          type: string
        description: 'Уровень: beginner/intermediate/advanced/any'
      - in: query
        name: status
        schema:
          type: string
        description: Статус курса
      - in: query
        name: studio
        schema:
          type: string
        description: Название студии
      - in: query
        name: style
        schema:
          type: string
        description: Slug или название стиля
      - in: query
        name: teacher
        schema:
          type: string
        description: Имя, фамилия или email преподавателя
      tags:
      - Courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseList'
          description: ''
    post:
      operationId: api_courses_create
      description: Создает новый курс. Доступно преподавателю или администратору.
      summary: Создать курс
      tags:
      - Courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
          description: ''
  /api/courses/{course_id}/enroll/:
    post:
      operationId: api_courses_enroll_create
      description: Создает запись текущего пользователя на курс.
      summary: Записаться на курс
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EnrollmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EnrollmentRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
          description: ''
    delete:
      operationId: api_courses_enroll_destroy
      description: Помечает запись текущего пользователя как отмененную.
      summary: Отменить запись на курс
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/courses/{id}/:
    get:
      operationId: api_courses_retrieve
      description: Возвращает полную карточку курса для детальной страницы.
      summary: Детальная информация о курсе
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
          description: ''
    put:
      operationId: api_courses_update
      description: Полностью обновляет курс. Доступно преподавателю курса или администратору.
      summary: Полностью обновить курс
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
          description: ''
    patch:
      operationId: api_courses_partial_update
      description: Обновляет курс. Доступно преподавателю курса или администратору.
      summary: Обновить курс
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCourseWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCourseWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCourseWriteRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
          description: ''
    delete:
      operationId: api_courses_destroy
      description: Удаляет курс. Доступно преподавателю курса или администратору.
      summary: Удалить курс
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/courses/{id}/attendance/:
    get:
      operationId: api_courses_attendance_list
      description: Возвращает все отметки посещаемости по выбранному курсу.
      summary: Посещаемость по курсу
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
          description: ''
  /api/courses/{id}/lessons/:
    get:
      operationId: api_courses_lessons_list
      description: Возвращает список занятий выбранного курса.
      summary: Занятия курса
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: query
        name: status
        schema:
          type: string
        description: Фильтр по статусу занятия
      tags:
      - Lessons
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lesson'
          description: ''
    post:
      operationId: api_courses_lessons_create
      description: Создает новое занятие для курса. Доступно преподавателю курса или
        администратору.
      summary: Создать занятие курса
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Lessons
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LessonWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LessonWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
          description: ''
  /api/courses/{id}/students/:
    get:
      operationId: api_courses_students_list
      description: Возвращает список учеников, записанных на выбранный курс.
      summary: Студенты курса
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: query
        name: status
        schema:
          type: string
        description: Статус записи
      tags:
      - Courses
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseStudent'
          description: ''
  /api/dance-styles/:
    get:
      operationId: api_dance_styles_list
      description: Возвращает справочник танцевальных стилей.
      summary: Список танцевальных стилей
      tags:
      - Reference
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DanceStyle'
          description: ''
  /api/dashboard/student/:
    get:
      operationId: api_dashboard_student_retrieve
      description: Возвращает краткую сводку по активным курсам, избранному и ближайшим
        занятиям ученика.
      summary: Дашборд ученика
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDashboard'
          description: ''
  /api/dashboard/teacher/:
    get:
      operationId: api_dashboard_teacher_retrieve
      description: Возвращает сводку по курсам, ученикам, ближайшим занятиям и посещаемости
        преподавателя.
      summary: Дашборд преподавателя
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherDashboard'
          description: ''
  /api/enrollments/:
    get:
      operationId: api_enrollments_list
      description: Возвращает записи текущего пользователя на курсы.
      summary: Записи пользователя на курсы
      tags:
      - Users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Enrollment'
          description: ''
  /api/favorite-courses/{course_id}/:
    post:
      operationId: api_favorite_courses_create
      description: Добавляет курс в избранное текущего пользователя.
      summary: Добавить курс в избранное
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteCourse'
          description: ''
    delete:
      operationId: api_favorite_courses_destroy
      description: Удаляет курс из избранного текущего пользователя.
      summary: Удалить курс из избранного
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/favorite-teachers/{teacher_id}/:
    post:
      operationId: api_favorite_teachers_create
      description: Добавляет преподавателя в избранное текущего пользователя.
      summary: Добавить преподавателя в избранное
      parameters:
      - in: path
        name: teacher_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteTeacher'
          description: ''
    delete:
      operationId: api_favorite_teachers_destroy
      description: Удаляет преподавателя из избранного текущего пользователя.
      summary: Удалить преподавателя из избранного
      parameters:
      - in: path
        name: teacher_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/favorites/:
    get:
      operationId: api_favorites_retrieve
      description: Возвращает избранные курсы текущего пользователя.
      summary: Избранные курсы пользователя
      tags:
      - Users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoritesResponse'
          description: ''
  /api/lessons/{lesson_id}/:
    get:
      operationId: api_lessons_retrieve
      parameters:
      - in: path
        name: lesson_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
          description: ''
    put:
      operationId: api_lessons_update
      description: Полностью обновляет занятие. Доступно преподавателю курса или администратору.
      summary: Полностью обновить занятие
      parameters:
      - in: path
        name: lesson_id
        schema:
          type: integer
        required: true
      tags:
      - Lessons
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LessonWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LessonWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
          description: ''
    patch:
      operationId: api_lessons_partial_update
      description: Обновляет занятие. Доступно преподавателю курса или администратору.
      summary: Обновить занятие
      parameters:
      - in: path
        name: lesson_id
        schema:
          type: integer
        required: true
      tags:
      - Lessons
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedLessonWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedLessonWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedLessonWriteRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
          description: ''
    delete:
      operationId: api_lessons_destroy
      description: Удаляет занятие. Доступно преподавателю курса или администратору.
      summary: Удалить занятие
      parameters:
      - in: path
        name: lesson_id
        schema:
          type: integer
        required: true
      tags:
      - Lessons
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/lessons/{lesson_id}/attendance/:
    get:
      operationId: api_lessons_attendance_list
      description: Возвращает отметки посещаемости по конкретному занятию.
      summary: Посещаемость по занятию
      parameters:
      - in: path
        name: lesson_id
        schema:
          type: integer
        required: true
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
          description: ''
  /api/lessons/{lesson_id}/attendance/mark/:
    post:
      operationId: api_lessons_attendance_mark_create
      description: Создает или обновляет отметку посещаемости ученика по занятию.
      summary: Отметить посещаемость
      parameters:
      - in: path
        name: lesson_id
        schema:
